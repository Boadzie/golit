# Sticky load balancing for Golit.
#
# Session state (kernel graph + Polars values) is worker-local, so every request
# from one client — its GET, its POSTs, and its long-lived /events SSE stream —
# must reach the same backend. `hash $cookie_golit_session consistent` routes by
# the session cookie Golit sets, so a client sticks to one replica. Redis fans
# server-side invalidations out to the others.

events {}

http {
    upstream golit {
        # Consistent hash on the Golit session cookie = sticky sessions.
        hash $cookie_golit_session consistent;
        server app1:8000;
        server app2:8000;
        server app3:8000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://golit;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE needs an unbuffered, long-lived connection.
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }
    }
}
